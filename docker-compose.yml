services:
  postgres:
    image: postgres:18-alpine
    container_name: phishaware-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phishaware}
      POSTGRES_USER: ${POSTGRES_USER:-phishaware}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phishaware}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishaware

  redis:
    image: redis:8-alpine
    container_name: phishaware-cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishaware

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishaware-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - phishaware

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: phishaware-web
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:5173:5173"
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev
    networks:
      - phishaware

  caddy:
    image: caddy:2-alpine
    container_name: phishaware-proxy
    ports:
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:80:80"
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:443:443"
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-localhost}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      TLS_DIRECTIVE: ${TLS_DIRECTIVE:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - phishaware

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  phishaware:
    driver: bridge