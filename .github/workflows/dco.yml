# DCO-Check: verlangt, dass jeder Commit eines PRs einen gültigen
# "Signed-off-by:"-Trailer trägt (Developer Certificate of Origin).
# Bot-Commits (Dependabot, release-please/github-actions) sind ausgenommen –
# sie werden automatisch erzeugt und können nicht signiert werden.
# Self-contained (keine Fremd-Action → keine Supply-Chain-Fläche),
# read-only Token, kein Secret-Zugriff.
name: DCO Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Signed-off-by auf allen PR-Commits prüfen
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          for sha in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            subject="$(git show -s --format='%s' "$sha")"
            author_email="$(git show -s --format='%ae' "$sha")"
            # Merge-Commits (mehr als ein Parent) überspringen.
            if [ "$(git rev-list --parents -n 1 "$sha" | wc -w)" -gt 2 ]; then
              continue
            fi
            # Bot-Commits (Dependabot, release-please/github-actions) ausnehmen:
            # ihre Autor-E-Mail enthaelt literal "[bot]".
            if printf '%s' "$author_email" | grep -qF '[bot]'; then
              echo "SKIP $sha  (bot: $author_email)"
              continue
            fi
            if git show -s --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <[^@]+@[^>]+>'; then
              echo "OK   $sha  $subject"
            else
              echo "::error::Commit $sha ($subject) hat keinen gültigen 'Signed-off-by'-Trailer."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "DCO fehlgeschlagen. Bitte alle Commits mit einem Sign-off versehen:"
            echo "  git commit -s            (fuer neue Commits)"
            echo "  git commit --amend -s    (letzten Commit nachtraeglich signieren)"
            echo "  git rebase --signoff <base>  (mehrere Commits nachtraeglich signieren)"
            exit 1
          fi
          echo "DCO OK – alle Commits sind signiert."
