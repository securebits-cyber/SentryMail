# PR-Checks: Typecheck + Build des Frontends.
# Least privilege: laeuft mit read-only Token und OHNE Zugriff auf Secrets,
# damit auch Fork-PRs gefahrlos geprueft werden koennen.
#
# WICHTIG (Repo-Setting): Settings -> Actions -> "Allow <owner>, and select
# non-<owner>, actions" muss GitHub-eigene Actions (actions/*) UND das Muster
# "googleapis/release-please-action@*" erlauben. Steht die Policy auf
# "local_only", scheitern alle Workflows mit "startup_failure", da actions/checkout
# blockiert ist.
name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Kein Lockfile vorhanden -> npm install statt npm ci.
      - run: npm install --no-audit --no-fund

      - run: npm run type-check

      - run: npm run build
